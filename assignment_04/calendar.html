<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        #header {
            background-image: url(july\ pic.jpg);
            background-size: cover;
            background-position: center;
            height: auto;
            width: 800px;
            margin-left: auto;
            margin: auto;
        }

        h1 {
            text-align: center;
            padding: 100px;
            font-size: 5em;
            color: white;
            text-shadow: 3px 5px 5px seagreen;
            margin: 0px;
        }

        #bday {
            background-image: url(bday.jpg);
            background-position: center;
            background-size: cover;
            color: white;
        }

        #bday-p {
            text-align: center;
            text-shadow: 1px 1px 0px rgb(255, 87, 132);
        }

        #Canadaday {
            background-image: url(Canada-Day-Flag-and-Fireworks-770x385.jpg);
            background-position: center;
            background-size: cover;
            color: white;
        }

        #can {
            text-align: center;
            text-shadow: 1px 1px 0px rgb(255, 87, 132);
        }

        #usaday {
            background-image: url(6b0b47f7-d6a4-4614-84fa-fa7a2de2f151-GettyImages-1153674175.webp);
            background-position: center;
            background-size: cover;
            color: white;
        }

        #usa {
            text-align: center;
            text-shadow: 1px 1px 0px rgb(255, 87, 132);
        }

        .grey{
            background-color: rgb(203, 203, 203);
        }

        table {
            width: 800px;
            table-layout: fixed;
            border-collapse: collapse;
            margin-left: auto;
            margin-right: auto;
        }


        th {
            border: 1px solid rgb(93, 201, 255);
            text-align: center;
        }

        td {
            vertical-align: top;
            border: 1px solid rgb(93, 201, 255);
            height: 110px;
            padding: 5px;
        }
    </style>
</head>

<body>
    <div id="header">
        <h1>
            July 2026
        </h1>
    </div>

    <table>
        <tr>
            <th>Sun</th>
            <th>Mon</th>
            <th>Tue</th>
            <th>Wed</th>
            <th>Thu</th>
            <th>Fri</th>
            <th>Sat</th>
        </tr>

        <tr>
            <td class="grey">28</td>
            <td class="grey">29</td>
            <td class="grey">30</td>
            <td id="Canadaday">
                1
                <div id="can">
                    <p>Canada Day</p>
                </div>
            </td>
            <td>2</td>
            <td>3</td>
            <td id="usaday">
                4
                <div id="usa">
                    <p>US National Day</p>
                </div>
            </td>
        </tr>

        <tr>
            <td>5</td>
            <td>6</td>
            <td>7</td>
            <td>8</td>
            <td>9</td>
            <td>10</td>
            <td>11</td>
        </tr>

        <tr>
            <td>12</td>
            <td>13</td>
            <td>14</td>
            <td>15</td>
            <td>16</td>
            <td>17</td>
            <td>18</td>
        </tr>

        <tr>
            <td id="bday">
                19
                <div id="bday-p">
                    <p>My Birthday</p>
                </div>
            </td>
            <td>20</td>
            <td>21</td>
            <td>22</td>
            <td>23</td>
            <td>24</td>
            <td>25</td>
        </tr>

        <tr>
            <td>26</td>
            <td>27</td>
            <td>28</td>
            <td>29</td>
            <td>30</td>
            <td>31</td>
            <td class="grey">1</td>
        </tr>
    </table>

</body>

</html>
